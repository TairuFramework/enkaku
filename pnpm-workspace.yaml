packages:
  - packages/*
  - tests/*
  - website

allowBuilds:
  '@biomejs/biome': true
  '@swc/core': false
  core-js: true
  core-js-pure: true
  electron: true
  esbuild: false
  msgpackr-extract: false
  unrs-resolver: true

blockExoticSubdeps: false

catalog:
  '@biomejs/biome': ^2.5.0
  '@dipakparmar/docusaurus-plugin-umami': ^2.4.0
  '@docusaurus/core': ^3.10.1
  '@docusaurus/faster': ^3.10.1
  '@docusaurus/module-type-aliases': ^3.10.1
  '@docusaurus/preset-classic': ^3.10.1
  '@docusaurus/theme-mermaid': ^3.10.1
  '@docusaurus/tsconfig': ^3.10.1
  '@docusaurus/types': ^3.10.1
  '@electron-forge/cli': ^7.11.2
  '@electron-forge/plugin-vite': ^7.11.2
  '@hono/node-server': ^2.0.8
  '@kigu/dev': ^0.1.2
  '@kokuin/capability': ^0.1.0
  '@kokuin/electron': ^0.2.0
  '@kokuin/token': ^0.1.1
  '@opentelemetry/sdk-trace-base': ^2.9.0
  '@opentelemetry/sdk-trace-node': ^2.9.0
  '@orama/plugin-docusaurus-v3': ^3.1.18
  '@playwright/test': 1.61.1
  '@sozai/async': ^0.1.0
  '@sozai/event': ^0.1.0
  '@sozai/execution': ^0.1.0
  '@sozai/log': ^0.1.0
  '@sozai/otel': ^0.2.0
  '@sozai/runtime': ^0.1.0
  '@sozai/schema': ^0.1.0
  '@sozai/stream': ^0.1.0
  '@swc/cli': ^0.8.1
  '@swc/core': ^1.15.41
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.2
  '@types/node': ^26.1.1
  '@types/react': ^19.2.17
  '@vitejs/plugin-react': ^6.0.3
  '@vitest/ui': ^4.1.9
  canonicalize: 3.0.0
  del-cli: ^7.0.0
  electron: ^43.1.0
  eventsource-parser: ^3.1.0
  get-port: ^7.2.0
  happy-dom: ^20.10.6
  react: 19.2.3
  react-dom: 19.2.3
  react-native-electron: ^0.22.1
  react-native-web: 0.21.2
  tsx: ^4.22.4
  turbo: ^2.9.18
  typedoc: ^0.28.20
  typedoc-plugin-markdown: ^4.12.0
  typescript: ^6.0.3
  vite: ^8.1.4
  vitest: ^4.1.10

catalogMode: prefer

minimumReleaseAgeExclude:
  - '@kigu/*'
  - '@kokuin/*'
  - '@sozai/*'

overrides:
  # extract-zip 2.0.1 (via @electron/packager) pulls yauzl 2.10.0, whose
  # extraction lets Node exit 0 mid-package on some runtimes (node 24.17, 26).
  # yauzl 3.x keeps the event loop alive through extraction. See e2e-desktop.
  yauzl: ^3.4.0

nodeLinker: hoisted

supportedArchitectures:
  cpu: [ current ]
  os: [ current ]
