  '@vitejs/plugin-react': ^6.0.2
  '@vitest/ui': ^4.1.9
  canonicalize: 3.0.0
  del-cli: ^7.0.0
  electron: ^42.4.1
  eventsource-parser: ^3.1.0
  get-port: ^7.2.0
  happy-dom: ^20.10.6
  react: 19.2.3
  react-dom: 19.2.3
  react-native-electron: ^0.22.1
  react-native-web: 0.21.2
  tsx: ^4.22.4
  turbo: ^2.9.18
  typedoc: ^0.28.19
  typedoc-plugin-markdown: ^4.12.0
  typescript: ^6.0.3
  vite: ^8.0.16
  vitest: ^4.1.9

